{% extends 'showroom/base.html' %}
{% block content %}

<section class="contact-section py-5 text-light">
  <div class="container">
    <h2 class="text-center mb-4 glow-text">📞 Contact EV Showroom</h2>
    <p class="text-center mb-5">We’d love to hear from you! Fill out the form below or visit our showroom.</p>

  <div class="row">
  <!-- Contact Form -->
  <div class="col-md-6 mb-4">
    <div class="card bg-dark text-light shadow-lg border-0 p-4 rounded-4">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="name" class="form-label">Full Name</label>
          {{ form.name }}
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          {{ form.email }}
        </div>
        <div class="mb-3">
          <label for="subject" class="form-label">Subject</label>
          {{ form.subject }}
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          {{ form.message }}
        </div>
        <button type="submit" class="btn btn-neon w-100">Send Message</button>
      </form>
    </div>
  </div>
</div>


      <!-- Map Section -->
      <div class="col-md-6">
        <div class="card bg-dark border-0 shadow-lg rounded-4 overflow-hidden">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d29284.54392725649!2d75.8625252848146!3d23.43996797302455!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sghonsla%20ujjain%20-%20agar%20road%20ghosla%20madhya%20pradesh!5e0!3m2!1sen!2sin!4v1761998725406!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">"
            width="100%"
            height="400"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>
    </div>
  </div>
</section>

<style>
.contact-section {
  background: radial-gradient(circle at top right, #00ffc3 0%, #0a0f1a 80%);
  background-attachment: fixed;
  color: #fff;
}

.glow-text {
  color: #00ffc3;
  text-shadow: 0 0 15px #00ffc3, 0 0 40px #00bfa0;
}

.btn-neon {
  background: #00ffc3;
  color: #000;
  font-weight: 600;
  border-radius: 50px;
  padding: 12px 30px;
  transition: all 0.3s ease;
  box-shadow: 0 0 20px #00ffc3;
}

.btn-neon:hover {
  background: #00bfa0;
  color: #fff;
  box-shadow: 0 0 25px #00ffc3;
  transform: translateY(-3px);
}
</style>

{% endblock %}
