{% extends 'showroom/base.html' %}
{% load static %}
{% load socialaccount %}
{% block content %}

<style>
  body {
    background: #0d0d0d;
    font-family: 'Inter', sans-serif;
    color: #fff;
  }

  .login-wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .login-card {
    background: #1a1a1a;
    padding: 40px 35px;
    border-radius: 20px;
    width: 360px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
    text-align: center;
  }

  .login-card h2 {
    font-size: 1.5rem;
    margin-bottom: 10px;
    font-weight: 700;
    color: #00c3ff;
  }

  .login-card p {
    color: #aaa;
    font-size: 0.9rem;
    margin-bottom: 25px;
  }

  .login-card input {
    width: 100%;
    background: #222;
    border: 1px solid #333;
    color: #fff;
    padding: 12px 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    outline: none;
    font-size: 0.95rem;
    transition: border 0.3s ease;
  }

  .login-card input:focus {
    border-color: #00c3ff;
  }

  .btn-primary {
    width: 100%;
    background: #00c3ff;
    border: none;
    color: #000;
    font-weight: 700;
    padding: 12px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s ease;
  }

  .btn-primary:hover {
    background: #00a5e0;
  }

  .divider {
    margin: 25px 0;
    color: #777;
    font-size: 0.85rem;
    position: relative;
  }

  .divider::before,
  .divider::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: #333;
  }

  .divider::before {
    left: 0;
  }

  .divider::after {
    right: 0;
  }

  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: #fff;
    color: #000;
    border-radius: 10px;
    padding: 12px 0;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s ease;
  }

  .btn-google:hover {
    background: #f2f2f2;
  }

  .btn-google img {
    width: 20px;
    height: 20px;
  }

  .signup-text {
    margin-top: 20px;
    font-size: 0.9rem;
    color: #aaa;
  }

  .signup-text a {
    color: #00c3ff;
    text-decoration: none;
    font-weight: 600;
  }

  .signup-text a:hover {
    text-decoration: underline;
  }

  @media (max-width: 480px) {
    .login-card {
      width: 90%;
      padding: 30px 25px;
    }
  }
</style>

<div class="login-wrapper">
  <div class="login-card">
    <h2>Sign in to Sawariya EV ⚡</h2>
    <p>Welcome back! Please login to continue</p>


    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <input type="text" name="identifier" placeholder="Email or username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="btn-primary">Continue →</button>
    </form>


    <div class="divider">or</div>
    <a href="{% provider_login_url 'google' method='oauth2' %}" class="btn-google">
      <img src="{% static 'images/hello-google.png' %}" alt=""> Sign in with Google
    </a>

    <div class="signup-text">
      Don’t have an account? <a href="{% url 'register' %}">Register here</a>
    </div>
  </div>
</div>

{% endblock %}
