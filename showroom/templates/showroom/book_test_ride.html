{% extends 'showroom/base.html' %}
{% block content %}

<h2 class="text-center mb-4">Book a Test Ride for {{ bike.name }}</h2>

<form method="POST" class="card p-4 shadow-sm">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary w-100 mt-3">Submit Booking</button>
</form>

{% endblock %}
